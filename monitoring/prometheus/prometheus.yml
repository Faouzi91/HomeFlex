global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'homeflex-backend'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    bearer_token: '${MONITORING_METRICS_TOKEN:-changeme-metrics-token}'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: homeflex-api
