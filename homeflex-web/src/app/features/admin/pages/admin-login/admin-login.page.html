<div class="min-h-screen bg-slate-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div
        class="flex h-12 w-12 items-center justify-center rounded-xl bg-brand-500 text-white shadow-lg"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="h-7 w-7"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 0 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085"
          />
        </svg>
      </div>
    </div>
    <h2 class="mt-6 text-center text-2xl font-extrabold text-white">Admin Console</h2>
    <p class="mt-2 text-center text-sm text-slate-400">HomeFlex Platform Administration</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-slate-800 py-8 px-4 shadow-2xl border border-slate-700 sm:rounded-2xl sm:px-10">
      @if (session.error()) {
        <div class="mb-6 rounded-lg bg-rose-500/10 p-4 border border-rose-500/20">
          <p class="text-sm font-bold text-rose-400">{{ session.error() }}</p>
        </div>
      }

      <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
        <div>
          <label for="admin-email" class="block text-sm font-bold text-slate-300"
            >Email address</label
          >
          <div class="mt-1">
            <input
              id="admin-email"
              type="email"
              formControlName="email"
              autocomplete="email"
              required
              class="appearance-none block w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
              placeholder="admin@homeflex.com"
            />
          </div>
        </div>

        <div>
          <label for="admin-password" class="block text-sm font-bold text-slate-300"
            >Password</label
          >
          <div class="mt-1">
            <input
              id="admin-password"
              type="password"
              formControlName="password"
              autocomplete="current-password"
              required
              class="appearance-none block w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
              placeholder="••••••••"
            />
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="session.pending()"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg text-sm font-bold text-white bg-brand-500 hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-brand-500 disabled:opacity-50 transition-colors"
          >
            {{ session.pending() ? 'Authenticating...' : 'Sign in to Admin' }}
          </button>
        </div>
      </form>

      <div class="mt-6 pt-6 border-t border-slate-700">
        <p class="text-xs text-center text-slate-500">
          This is a restricted area. Unauthorized access attempts are logged.
        </p>
      </div>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      <a routerLink="/" class="text-slate-500 hover:text-slate-400 transition-colors"
        >Back to HomeFlex</a
      >
    </p>
  </div>
</div>
