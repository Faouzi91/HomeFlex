# application.yml - Spring Boot Configuration
spring:
  profiles:
    active: dev

  application:
    name: homeflex-api
  config:
    import: optional:file:.env

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/rental_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Elasticsearch Configuration
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

  # RabbitMQ Configuration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true

  # Enable virtual threads (Java 21)
  threads:
    virtual:
      enabled: true

  # WebSocket Configuration
  websocket:
    allowed-origins:
      - http://localhost:4200
      - https://yourdomain.com

# Server Configuration
server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Application Configuration
app:
  # Admin Configuration (Use environment variables in production)
  admin:
    email: ${ADMIN_EMAIL:admin@homeflex.com}
    password: ${ADMIN_PASSWORD}
    first-name: ${ADMIN_FIRST_NAME:Admin}
    last-name: ${ADMIN_LAST_NAME:User}

  # JWT Configuration (SRS FR-101: 15-min access, 7-day refresh)
  jwt:
    secret: ${JWT_SECRET}
    expiration: 900000 # 15 minutes in milliseconds
    refresh-expiration: 604800000 # 7 days in milliseconds
    cookie:
      access-token-name: ACCESS_TOKEN
      refresh-token-name: REFRESH_TOKEN
      secure: ${JWT_COOKIE_SECURE:true}
      same-site: Lax
      max-age-seconds: 604800 # 7 days (refresh token)

  # Security Configuration
  security:
    pii-encryption-key: ${PII_ENCRYPTION_KEY}

  # Stripe Payment Configuration (FR-400)
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    platform-commission: 0.15 # 15% platform commission
    currency: ${STRIPE_DEFAULT_CURRENCY:xaf}

  # AWS S3 Configuration
  aws:
    enabled: false
    s3:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      region: ${AWS_REGION:us-east-1}
      bucket-name: ${AWS_S3_BUCKET:rental-app-media}
      endpoint: ${AWS_S3_ENDPOINT:}

  # Firebase Configuration
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

  # Google OAuth Configuration
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

  # Outbox Relay Configuration
  outbox:
    relay-enabled: ${OUTBOX_RELAY_ENABLED:true}
    batch-size: 50
    poll-interval-ms: 5000
    max-retries: 5
    base-backoff-seconds: 2
    exchange-name: homeflex.events

  # Rate Limiting
  rate-limit:
    authenticated-requests-per-minute: 100
    public-requests-per-minute: 20
    window-seconds: 60

  # Monitoring / Prometheus scrape token
  monitoring:
    metrics-token: ${MONITORING_METRICS_TOKEN}

  # CORS Configuration
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:5000
      - https://yourdomain.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - Content-Type
      - Accept
      - Authorization
      - X-Requested-With
      - X-XSRF-TOKEN
    exposed-headers: []
    allow-credentials: true
    max-age: 3600

# Logging Configuration
logging:
  level:
    root: INFO
    com.homeflex: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99

# Swagger/OpenAPI Configuration (disabled by default; enabled only in dev profile)
springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  devtools:
    restart:
      enabled: true

# Swagger enabled only in dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.homeflex: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.homeflex: INFO
  file:
    name: /var/log/rental-app/application.log
