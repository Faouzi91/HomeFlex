<div class="min-h-screen bg-white flex flex-col relative">
  <!-- Global Loader -->
  @if (notificationService.loading()) {
    <app-loader />
  }

  <!-- Global Alerts -->
  <div class="fixed top-20 right-4 z-50 w-full max-w-sm flex flex-col gap-3 pointer-events-none">
    @for (alert of notificationService.notifications(); track alert.id) {
      <div class="pointer-events-auto animate-in slide-in-from-right fade-in duration-300">
        <app-alert
          [type]="alert.type"
          [message]="alert.message"
          (dismiss)="notificationService.dismiss(alert.id)"
        />
      </div>
    }
  </div>

  <app-header />

  <main class="flex-grow">
    <router-outlet />
  </main>

  <app-footer />

  <!-- Global Help/Support Widget -->
  <a routerLink="/support" class="fixed bottom-6 right-6 z-50 flex items-center justify-center w-14 h-14 bg-brand-600 text-white rounded-full shadow-2xl hover:bg-brand-700 hover:scale-105 transition-all outline-none focus:ring-4 focus:ring-brand-500/50 group" aria-label="Customer Support">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
    </svg>
    <div class="absolute right-full mr-4 bg-white text-slate-800 text-sm font-bold py-2 px-4 rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap border border-slate-100">
      Need Help?
    </div>
  </a>
</div>
