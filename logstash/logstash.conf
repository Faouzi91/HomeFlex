input {
  tcp {
    port => 50000
    codec => json_lines
  }
}

filter {
  # LogstashEncoder already provides structured JSON parsed by json_lines codec.
  # Fields like @timestamp, level, message, logger_name, stack_trace are top-level.

  # Tag exceptions for easy Kibana filtering
  if [stack_trace] {
    mutate {
      add_tag => ["exception"]
    }
  }

  # Normalize log level field for consistent Kibana dashboards
  if [level] {
    mutate {
      add_field => { "log_level" => "%{[level]}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "homeflex-backend-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
