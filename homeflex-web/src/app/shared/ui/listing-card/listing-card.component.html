<article class="group relative flex flex-col cursor-pointer">
  <!-- Image container -->
  <a
    class="relative overflow-hidden rounded-2xl bg-slate-100 aspect-[4/3] block"
    [routerLink]="href()"
  >
    <img
      [src]="image()"
      [alt]="title()"
      class="h-full w-full object-cover transition-transform duration-500 ease-out group-hover:scale-[1.04]"
      loading="lazy"
    />
    <!-- Gradient overlay on hover -->
    <div class="card-img-overlay"></div>

    <!-- Top-right badges -->
    <div class="absolute right-3 top-3 flex flex-col items-end gap-1.5">
      <span
        class="inline-flex items-center rounded-lg bg-white/95 px-2.5 py-1 text-[10px] font-black uppercase tracking-widest text-slate-700 shadow-sm backdrop-blur-sm"
      >
        {{ badge() }}
      </span>
      @if (isInstantBook()) {
        <span
          class="inline-flex items-center gap-1 rounded-lg bg-gold-500/95 px-2 py-1 text-[10px] font-black uppercase tracking-widest text-white shadow-sm backdrop-blur-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="w-3 h-3"
          >
            <path
              d="M11.983 1.907a.75.75 0 0 0-1.292-.657l-8.5 9.5A.75.75 0 0 0 2.75 12h6.572l-1.305 6.093a.75.75 0 0 0 1.292.657l8.5-9.5A.75.75 0 0 0 17.25 8h-6.572l1.305-6.093Z"
            />
          </svg>
          Instant Book
        </span>
      }
    </div>

    <!-- View count — bottom-left on hover -->
    <div
      class="absolute bottom-3 left-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200"
    >
      <span
        class="inline-flex items-center gap-1 rounded-lg bg-black/60 px-2 py-1 text-[10px] font-bold text-white backdrop-blur-sm"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-3 h-3"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
          />
        </svg>
        {{ compact(stats()) }} views
      </span>
    </div>
  </a>

  <!-- Card content -->
  <div class="pt-3 px-0.5">
    <!-- Location + price row -->
    <div class="flex items-start justify-between gap-2 mb-0.5">
      <p class="text-xs text-slate-500 flex items-center gap-1 truncate">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-3 h-3 shrink-0 text-slate-400"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
          />
        </svg>
        <span class="truncate">{{ location() }}</span>
      </p>
    </div>

    <!-- Title -->
    <a
      class="block text-sm font-bold text-slate-900 line-clamp-1 hover:text-brand-600 transition-colors mb-2"
      [routerLink]="href()"
    >
      {{ title() }}
    </a>

    <!-- Price + chips row -->
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-baseline gap-1">
        <span class="text-base font-extrabold text-slate-900">{{ price() }}</span>
        <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-tight">{{
          priceSuffix()
        }}</span>
      </div>
      <div class="flex flex-wrap gap-1">
        @for (chip of chips().slice(0, 2); track chip) {
          <span
            class="inline-flex items-center rounded-md bg-slate-50 border border-slate-100 px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider text-slate-500"
          >
            {{ chip }}
          </span>
        }
      </div>
    </div>
  </div>
</article>
