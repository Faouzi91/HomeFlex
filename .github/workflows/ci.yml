name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and Test with Maven
        run: mvn test
        working-directory: rental-backend

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci
        working-directory: rental-app-frontend
      - name: Run Lint
        run: npm run lint
        working-directory: rental-app-frontend
      - name: Run Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: rental-app-frontend
      - name: Build
        run: npm run build
        working-directory: rental-app-frontend
