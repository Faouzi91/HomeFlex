<article
  class="group relative flex flex-col overflow-hidden rounded-xl border border-slate-200 bg-white transition-all hover:shadow-zillow hover:-translate-y-1 duration-300"
>
  <!-- Image -->
  <a class="relative aspect-[4/3] overflow-hidden bg-slate-100" [routerLink]="href()">
    <img
      [src]="image()"
      [alt]="title()"
      class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"
      loading="lazy"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/20 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
    <div class="absolute right-3 top-3">
      <span
        class="inline-flex items-center rounded-lg bg-white/90 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-700 shadow-sm backdrop-blur-sm"
      >
        {{ badge() }}
      </span>
    </div>
    <div class="absolute left-3 bottom-3 opacity-0 group-hover:opacity-100 transition-opacity">
      <span class="inline-flex items-center gap-1 rounded-lg bg-black/50 px-2 py-1 text-[10px] font-bold text-white backdrop-blur-sm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3 h-3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
        {{ compact(stats()) }} views
      </span>
    </div>
  </a>

  <!-- Content -->
  <div class="flex flex-1 flex-col p-4">
    <div class="flex items-baseline justify-between mb-1">
      <p class="text-xl font-extrabold text-slate-900">{{ price() }}</p>
      <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">{{
        priceSuffix()
      }}</span>
    </div>

    <a
      class="mb-1 text-sm font-semibold text-slate-800 line-clamp-1 hover:text-brand-600 transition-colors"
      [routerLink]="href()"
    >
      {{ title() }}
    </a>

    <div class="flex items-center gap-1.5 mb-3 text-xs text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
      </svg>
      <span class="truncate">{{ location() }}</span>
    </div>

    <!-- Chips -->
    <div class="mt-auto flex flex-wrap gap-1.5 pt-3 border-t border-slate-100">
      @for (chip of chips(); track chip) {
        <span
          class="inline-flex items-center rounded-md bg-slate-50 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider text-slate-500 border border-slate-100"
        >
          {{ chip }}
        </span>
      }
    </div>
  </div>
</article>
