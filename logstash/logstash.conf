input {
  tcp {
    port => 50000
    codec => json_lines
  }
}

filter {
  # Parse JSON log fields from Spring Boot
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log"
    }
  }

  # Extract log level for Kibana filtering
  if [log][level] {
    mutate {
      add_field => { "log_level" => "%{[log][level]}" }
    }
  }

  # Parse ISO8601 timestamp from Spring Boot logs
  if [log][@timestamp] {
    date {
      match => ["[log][@timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Tag exceptions for easy filtering
  if [log][stack_trace] {
    mutate {
      add_tag => ["exception"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "homeflex-backend-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
