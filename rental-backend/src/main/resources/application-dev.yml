# application.yml - Spring Boot Configuration

spring:
  application:
    name: real-estate-rental-api
#  config:
#    import: optional:file:.env

  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/rental_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  
  # Email Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: aboucovicgarbatov@gmail.com
    password: sirwlmeueghwbhik
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  # WebSocket Configuration
  websocket:
    allowed-origins:
      - http://localhost:4200
      - https://yourdomain.com

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Application Configuration
app:
  # Admin Configuration
  admin:
    email: admin@realestate.com
    password: Admin@123
    first-name: Super
    last-name: Admin

  # JWT Configuration
  jwt:
    secret: my-super-secret-jwt-key-for-development-only-change-in-production
    expiration: 86400000  # 24 hours in milliseconds
    refresh-expiration: 604800000  # 7 days in milliseconds
  
  # AWS S3 Configuration
  aws:
    aws:
      s3:
        access-key: dummy-access-key
        secret-key: dummy-secret-key
        region: us-east-1
        bucket-name: rental-app-media
        endpoint: ""
  
  # Firebase Configuration
  firebase:
    enabled: true  # Set to true when you have the credentials file
    credentials-path: src/main/resources/firebase-adminsdk.json
  
  # Google OAuth Configuration
  google:
    client-id: dummy-client-id-for-development
    client-secret: dummy-client-secret-for-development
  
  # CORS Configuration
  cors:
    allowed-origins:
      - http://localhost:4200
      - https://yourdomain.com
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    exposed-headers: Authorization
    allow-credentials: true
    max-age: 3600

# Logging Configuration
logging:
  level:
    root: INFO
    com.realestate: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

