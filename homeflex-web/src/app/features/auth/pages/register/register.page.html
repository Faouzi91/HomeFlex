<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-xl">
    <div class="flex justify-center">
      <div
        class="flex h-12 w-12 items-center justify-center rounded-xl bg-brand-500 text-white shadow-lg shadow-brand-100"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="h-7 w-7"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
          />
        </svg>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">Create your account</h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      Already have an account?
      <a routerLink="/login" class="font-bold text-brand-600 hover:text-brand-500"> Sign in </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-xl">
    <div class="bg-white py-8 px-4 shadow-zillow border border-slate-100 sm:rounded-2xl sm:px-10">
      @if (session.error()) {
        <div class="mb-6 rounded-md bg-rose-50 p-4 border border-rose-100">
          <p class="text-sm font-bold text-rose-700">{{ session.error() }}</p>
        </div>
      }

      <form class="space-y-6" [formGroup]="form" (ngSubmit)="submit()">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
          <div>
            <label for="firstName" class="block text-sm font-bold text-slate-700">
              First name
            </label>
            <div class="mt-1">
              <input
                id="firstName"
                type="text"
                formControlName="firstName"
                autocomplete="given-name"
                required
                class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                placeholder="e.g. Aboub"
              />
            </div>
          </div>

          <div>
            <label for="lastName" class="block text-sm font-bold text-slate-700"> Last name </label>
            <div class="mt-1">
              <input
                id="lastName"
                type="text"
                formControlName="lastName"
                autocomplete="family-name"
                required
                class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                placeholder="e.g. Njoya"
              />
            </div>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-bold text-slate-700"> Email address </label>
          <div class="mt-1">
            <input
              id="email"
              type="email"
              formControlName="email"
              autocomplete="email"
              required
              class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
              placeholder="you@example.com"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
          <div>
            <label for="phone" class="block text-sm font-bold text-slate-700"> Phone </label>
            <div class="mt-1">
              <input
                id="phone"
                type="tel"
                formControlName="phoneNumber"
                autocomplete="tel"
                required
                class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                placeholder="+237 6xx xx xx xx"
              />
            </div>
          </div>

          <div>
            <label for="role" class="block text-sm font-bold text-slate-700"> Account type </label>
            <div class="mt-1">
              <select
                id="role"
                formControlName="role"
                class="block w-full px-4 py-3 border border-slate-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm font-bold text-slate-700"
              >
                <option value="TENANT">Renter (Book items)</option>
                <option value="LANDLORD">Host (List items)</option>
              </select>
            </div>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-bold text-slate-700"> Password </label>
          <div class="mt-1">
            <input
              id="password"
              type="password"
              formControlName="password"
              autocomplete="new-password"
              required
              class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
              placeholder="Create a strong password"
            />
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="session.pending()"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-lg text-sm font-bold text-white bg-brand-500 hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 disabled:opacity-50 shadow-brand-100"
          >
            {{ session.pending() ? 'Creating account...' : 'Create account' }}
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-100">
        <p class="text-xs text-center text-slate-400 font-medium">
          By registering, you agree to our <a href="#" class="underline">Terms of Service</a> and
          <a href="#" class="underline">Privacy Policy</a>.
        </p>
      </div>
    </div>
  </div>
</div>
