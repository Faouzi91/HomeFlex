# application-dev.yml — Local development overrides only.
# Base config lives in application.yml; this file adds dev-specific tweaks.

spring:
  devtools:
    restart:
      enabled: true

  jpa:
    show-sql: true

# Show detailed errors in dev (never in prod)
server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

# Verbose security logging for local debugging
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
