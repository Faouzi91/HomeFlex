services:
  backend:
    build:
      context: ./rental-backend
    container_name: rental-backend
    ports:
      - '8080:8080'
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=dev-super-secret-jwt-key-change-in-production
      - STRIPE_API_KEY=sk_test_dummy_key_for_local_dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/homeflex
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - LOGSTASH_HOST=logstash
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://localhost:8080/actuator/health/liveness']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_started
    restart: unless-stopped
    networks:
      - rental-network

  frontend:
    build:
      context: ./homeflex-web
      network: host
    container_name: rental-frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rental-network

  # mobile-frontend:
  #   build:
  #     context: ./rental-app-flutter
  #     network: host
  #   container_name: rental-mobile-frontend
  #   restart: unless-stopped
  #   networks:
  #     - rental-network

  db:
    image: postgres:18-alpine
    container_name: rental-db
    environment:
      - POSTGRES_DB=homeflex
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    expose:
      - '5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rental-network

  redis:
    image: redis:8-alpine
    container_name: rental-redis
    expose:
      - '6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rental-network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rental-rabbitmq
    expose:
      - '5672'
      - '15672'
    environment:
      - RABBITMQ_DEFAULT_USER=${SPRING_RABBITMQ_USERNAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${SPRING_RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rental-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.2
    container_name: rental-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - '9200'
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rental-network

  logstash:
    image: docker.elastic.co/logstash/logstash:9.1.2
    container_name: rental-logstash
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    expose:
      - '50000'
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rental-network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.2
    container_name: rental-kibana
    expose:
      - '5601'
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rental-network

networks:
  rental-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
