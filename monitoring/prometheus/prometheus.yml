global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'homeflex-backend'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    # In production, use bearer_token_file with a mounted secret instead
    bearer_token: 'changeme-metrics-token'
    static_configs:
      - targets: ['rental-backend:8080']
        labels:
          application: homeflex-api
