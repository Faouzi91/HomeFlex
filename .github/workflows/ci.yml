name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rental_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-test-secret-key-at-least-32-chars-long
      SPRING_PROFILES_ACTIVE: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B verify --no-transfer-progress
        working-directory: rental-backend

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: rental-app-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: rental-app-frontend

      - name: Run Lint
        run: npm run lint
        working-directory: rental-app-frontend

      - name: Run Tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: rental-app-frontend

      - name: Build
        run: npm run build
        working-directory: rental-app-frontend
