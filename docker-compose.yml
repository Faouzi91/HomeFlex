version: '3.8'

services:
  backend:
    build: ./rental-backend
    container_name: rental-backend
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/rentaldb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://localhost:8080/actuator/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - db
    networks:
      - rental-network

  frontend:
    build: ./rental-app-frontend
    container_name: rental-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - rental-network

  db:
    image: postgres:15-alpine
    container_name: rental-db
    environment:
      - POSTGRES_DB=rentaldb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rental-network

networks:
  rental-network:
    driver: bridge

volumes:
  postgres-data:
