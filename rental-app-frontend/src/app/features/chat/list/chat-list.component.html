<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Messages</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
  <div *ngIf="!loading && rooms.length === 0" class="ion-text-center ion-padding">
    <p>No conversations yet.</p>
  </div>

  <ion-list *ngIf="!loading && rooms.length > 0">
    <ion-item *ngFor="let r of rooms" (click)="openRoom(r.id)" button="true">
      <ion-label>
        <h2>{{ r.propertyTitle }}</h2>
        <p *ngIf="r.unreadCount > 0">{{ r.unreadCount }} unread</p>
      </ion-label>
      <ion-button slot="end" fill="clear" (click)="$event.stopPropagation(); openRoom(r.id)">
        <ion-icon name="chevron-forward"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
