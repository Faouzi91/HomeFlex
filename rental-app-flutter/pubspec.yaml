name: homeflex_flutter
description: A new Flutter project for HomeFlex rental platform.
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.4.3
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.3
  go_router: ^17.2.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  stomp_dart_client: 3.0.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.0.7
  flutter_rating_bar: ^4.0.1
  google_sign_in: ^6.2.1
  url_launcher: ^6.2.5
  http_parser: ^4.0.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  geolocator: ^13.0.2
  local_auth: ^2.3.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.8
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
