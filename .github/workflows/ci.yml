name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rental_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SPRING_PROFILES_ACTIVE: test

      # DB
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/rental_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      # Redis
      SPRING_REDIS_HOST: localhost
      SPRING_REDIS_PORT: 6379

      # RabbitMQ
      SPRING_RABBITMQ_HOST: localhost
      SPRING_RABBITMQ_PORT: 5672

      # Security
      JWT_SECRET: ci-test-secret-key-at-least-32-chars-long

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Wait for services (CRITICAL)
      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 && break
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Wait for Redis
        run: |
          for i in {1..20}; do
            redis-cli -h localhost ping && break
            echo "Waiting for Redis..."
            sleep 2
          done

      - name: Wait for RabbitMQ
        run: |
          for i in {1..20}; do
            nc -z localhost 5672 && break
            echo "Waiting for RabbitMQ..."
            sleep 2
          done

      # Run tests explicitly
      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: rental-backend

      - name: Run Backend Tests
        run: ./gradlew test --no-daemon
        working-directory: rental-backend

      # Optional but cleaner separation
      - name: Build Backend
        run: ./gradlew build -x test --no-daemon
        working-directory: rental-backend

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: homeflex-web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: homeflex-web

      - name: Run Lint
        run: npm run lint
        working-directory: homeflex-web

      - name: Run Tests
        run: npm test
        working-directory: homeflex-web

      - name: Build
        run: npm run build
        working-directory: homeflex-web
