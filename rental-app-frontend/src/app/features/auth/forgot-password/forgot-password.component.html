<ion-content class="auth-page" [scrollY]="true">
    <div class="auth-container-simple">

        <!-- Mobile Logo -->
        <div class="mobile-logo">
            <div class="mobile-logo-icon">
                <ion-icon name="home"></ion-icon>
            </div>
            <h1 class="mobile-logo-text">{{ 'app.name' | translate }}</h1>
        </div>

        <!-- Form Card -->
        <div class="form-card-simple">
            <!-- Back Button -->
            <button class="back-button" (click)="goBack()">
                <ion-icon name="arrow-back"></ion-icon>
                <span>Back</span>
            </button>

            <h2 class="form-title">{{ 'auth.forgotTitle' | translate }}</h2>
            <p class="form-subtitle">{{ 'auth.forgotSubtitle' | translate }}</p>

            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">{{ 'auth.email' | translate }}</label>
                    <div class="input-wrapper">
                        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
                        <input type="email" formControlName="email" placeholder="john@example.com" class="form-input" />
                    </div>
                    <div *ngIf="email.invalid && (email.dirty || email.touched)" class="form-error">
                        <span *ngIf="email.errors?.['required']">{{ 'errors.requiredEmail' | translate }}</span>
                        <span *ngIf="email.errors?.['email']">{{ 'errors.invalidEmail' | translate }}</span>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
                    <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
                    <span>{{ 'auth.sendResetLink' | translate }}</span>
                </button>

                <!-- Back to Login -->
                <p class="footer-link">
                    <a routerLink="/auth/login" class="link">{{ 'auth.login' | translate }}</a>
                </p>

            </form>

        </div>

    </div>
</ion-content>
