<ion-content class="auth-page" [scrollY]="true">
    <div class="auth-container-simple">

        <!-- Mobile Logo -->
        <div class="mobile-logo">
            <div class="mobile-logo-icon">
                <ion-icon name="home"></ion-icon>
            </div>
            <h1 class="mobile-logo-text">{{ 'app.name' | translate }}</h1>
        </div>

        <!-- Form Card -->
        <div class="form-card-simple">
            <!-- Back Button -->
            <button class="back-button" (click)="goBack()">
                <ion-icon name="arrow-back"></ion-icon>
                <span>Back</span>
            </button>

            <h2 class="form-title">{{ 'auth.resetTitle' | translate }}</h2>
            <p class="form-subtitle">{{ 'auth.resetSubtitle' | translate }}</p>

            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">

                <!-- New Password -->
                <div class="form-group">
                    <label class="form-label">{{ 'auth.newPassword' | translate }}</label>
                    <div class="input-wrapper">
                        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
                        <input type="password" formControlName="password" placeholder="Create new password"
                            autocomplete="new-password" class="form-input" />
                    </div>
                    <div *ngIf="password.invalid && (password.dirty || password.touched)" class="form-error">
                        <span *ngIf="password.errors?.['required']">{{ 'errors.requiredPassword' | translate }}</span>
                        <span *ngIf="password.errors?.['minlength']">{{ 'errors.minPassword' | translate }}</span>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label">{{ 'auth.confirmPassword' | translate }}</label>
                    <div class="input-wrapper">
                        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
                        <input type="password" formControlName="confirmPassword" placeholder="Confirm new password"
                            autocomplete="new-password" class="form-input" />
                    </div>
                    <div *ngIf="form.errors?.['passwordMismatch'] && (form.get('confirmPassword')?.touched || form.get('confirmPassword')?.dirty)"
                        class="form-error">
                        {{ 'errors.passwordMismatch' | translate }}
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
                    <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
                    <span>{{ 'auth.resetPasswordBtn' | translate }}</span>
                </button>

                <!-- Back to Login -->
                <p class="footer-link">
                    <a routerLink="/auth/login" class="link">{{ 'auth.login' | translate }}</a>
                </p>

            </form>

        </div>

    </div>
</ion-content>
