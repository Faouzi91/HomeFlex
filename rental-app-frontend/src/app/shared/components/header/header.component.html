<ion-header class="app-header">
    <ion-toolbar class="app-toolbar">
        <div class="header-container">

            <!-- Left: Logo -->
            <div class="header-left">
                <div class="logo" (click)="navigate('/')">
                    <span class="logo-text">{{ 'app.name' | translate }}</span>
                </div>

                <!-- Desktop Nav -->
                <nav class="desktop-nav">
                    <button class="nav-btn" (click)="navigate('/properties?type=buy')">
                        <span>{{ 'header.buy' | translate }}</span>
                        <div class="nav-underline"></div>
                    </button>
                    <button class="nav-btn" (click)="navigate('/properties?type=rent')">
                        <span>{{ 'header.rent' | translate }}</span>
                        <div class="nav-underline"></div>
                    </button>
                    <button class="nav-btn" (click)="navigate('/properties?type=sell')">
                        <span>{{ 'header.sell' | translate }}</span>
                        <div class="nav-underline"></div>
                    </button>
                    <button class="nav-btn" (click)="navigate('/agents')">
                        <span>{{ 'header.agents' | translate }}</span>
                        <div class="nav-underline"></div>
                    </button>
                    <button class="nav-btn" (click)="navigate('/contact')">
                        <span>{{ 'header.contact' | translate }}</span>
                        <div class="nav-underline"></div>
                    </button>
                </nav>
            </div>

            <!-- Right: Actions -->
            <div class="header-right">

                <!-- Language Selector -->
                <select [(ngModel)]="selectedLang" (change)="changeLanguage($event)" class="lang-select">
                    <option value="en">EN</option>
                    <option value="fr">FR</option>
                </select>

                <!-- Not Logged In -->
                <ng-container *ngIf="!user">
                    <button class="btn-text" (click)="navigate('/auth/login')">
                        {{ 'auth.login' | translate }}
                    </button>
                    <button class="btn-signup" (click)="navigate('/auth/register')">
                        {{ 'auth.register' | translate }}
                    </button>
                </ng-container>

                <!-- Logged In -->
                <ng-container *ngIf="user">
                    <button class="icon-btn" (click)="navigate('/favorites')">
                        <ion-icon name="heart-outline"></ion-icon>
                    </button>

                    <!-- User Menu -->
                    <div class="user-menu">
                        <button class="user-avatar" (click)="toggleUserMenu()">
                            <span class="avatar-initials">{{ getUserInitials() }}</span>
                        </button>
                    </div>
                </ng-container>

                <!-- Mobile Menu Toggle -->
                <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
                    <ion-icon name="menu-outline"></ion-icon>
                </button>

            </div>

        </div>
    </ion-toolbar>
</ion-header>

<!-- Dropdown Menu OUTSIDE header (Portal Pattern) -->
<div class="dropdown-portal" *ngIf="user && userMenuOpen" (click)="closeUserMenu()">
    <div class="user-dropdown" (click)="$event.stopPropagation()" [style.top.px]="dropdownTop"
        [style.right.px]="dropdownRight">
        <div class="dropdown-header">
            <div class="user-name">{{ user.firstName }} {{ user.lastName }}</div>
            <div class="user-email">{{ user.email }}</div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" (click)="navigate('/profile')">
            <ion-icon name="person-outline"></ion-icon>
            <span>Profile</span>
        </button>
        <button class="dropdown-item" (click)="navigate('/bookings')">
            <ion-icon name="calendar-outline"></ion-icon>
            <span>Bookings</span>
        </button>
        <button class="dropdown-item" (click)="navigate('/properties/add')" *ngIf="user.role === 'LANDLORD'">
            <ion-icon name="add-circle-outline"></ion-icon>
            <span>Add Property</span>
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item dropdown-item-danger" (click)="logout()">
            <ion-icon name="log-out-outline"></ion-icon>
            <span>{{ 'auth.logout' | translate }}</span>
        </button>
    </div>
</div>
